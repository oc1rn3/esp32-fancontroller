            x: 90
            y: 154
            width: 214
            height: 22
            bg_color: 0x1E90FF
            bg_opa: 35%
            border_width: 0
            radius: 11

        - slider:
            id: ui_fan_speed_slider
            x: 94
            y: 160
            width: 206
            height: 10
            min_value: 0
            max_value: 100
            value: 0
            bg_color: 0x101010
            indicator:
              bg_color: 0x1E90FF
              bg_grad_dir: HOR
              bg_opa: COVER
            knob:
              bg_opa: TRANSP
              border_width: 0
              shadow_width: 0
              pad_all: 0
            on_press:
              then:
                - lvgl.widget.show: ui_fan_slider_glow
            on_value:
              then:
                - if:
                    condition:
                      lambda: "return id(fan_mode) == 'm';"
                    then:
                      - lambda: |-
                          lv_obj_t *ticks[] = {
                            id(ui_fan_tick_0), id(ui_fan_tick_1), id(ui_fan_tick_2), id(ui_fan_tick_3), id(ui_fan_tick_4),
                            id(ui_fan_tick_5), id(ui_fan_tick_6), id(ui_fan_tick_7), id(ui_fan_tick_8), id(ui_fan_tick_9),
                            id(ui_fan_tick_10)
                          };

                          const int speed = (int) x;
                          const int start_x = 94;
                          const int total_width = 206;
                          const int base_y_major = 179;
                          const int base_y_minor = 183;

                          for (int i = 0; i <= 10; i++) {
                            int tick_x = start_x + ((i * total_width) / 10);
                            const bool major = (i == 0 || i == 5 || i == 10);
                            const bool active = speed >= (i * 10);

                            int h = major ? (active ? 14 : 10) : (active ? 10 : 6);
                            int w = major ? 3 : 2;
                            int y = (major ? base_y_major : base_y_minor) - (h - (major ? 10 : 6));

                            uint32_t color = 0x4A4A4A;
                            if (i == 0) {
                              color = 0xFFFFFF;
                            } else if (i == 5) {
                              color = 0xFFA500;
                            } else if (i == 10) {
                              color = 0xFF0000;
                            } else if (active) {
                              color = 0xA8D8FF;
                            }

                            lv_obj_set_x(ticks[i], tick_x - (w / 2));
                            lv_obj_set_size(ticks[i], w, h);
                            lv_obj_set_y(ticks[i], y);
                            lv_obj_set_style_bg_color(ticks[i], lv_color_hex(color), LV_PART_MAIN);
                            lv_obj_set_style_bg_opa(ticks[i], LV_OPA_COVER, LV_PART_MAIN);
                          }
            on_release:
              then:
                - lvgl.widget.hide: ui_fan_slider_glow
                - if:
                    condition:
                      lambda: "return id(fan_mode) == 'm';"
                    then:
                      - lambda: |-
                          id(manual_speed) = (int) x;
                      - if:
                          condition:
                            lambda: "return ((int) x) <= 0;"
                          then:
                            - fan.turn_off: nws_fan
                          else:
                            - fan.turn_on:
                                id: nws_fan
                                speed: !lambda "return (int) x;"
                    else:
                      - lvgl.slider.update:
                          id: ui_fan_speed_slider
                          value: !lambda "return (!id(nws_fan).state) ? 0 : (int) id(nws_fan).speed;"
                - script.execute: sync_fan_ui


