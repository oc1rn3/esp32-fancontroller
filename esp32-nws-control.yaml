fan:
  - platform: speed
    id: nws_fan
    output: fan_pwm
#    icon: 
    name: "Lüfter"
    restore_mode: RESTORE_DEFAULT_ON
    speed_count: 100
    on_state:
      then:
        - script.execute: sync_fan_ui

    on_speed_set:
      then:
        - lvgl.slider.update:
            id: ui_fan_speed_slider
            value: !lambda "return (int)x;"

        - lvgl.widget.update:
            id: ui_fan_speed_slider
            indicator:
              bg_grad_color: !lambda |-
                float p = x;

                if (p <= 50.0f) {
                  uint8_t ratio = (uint8_t)((p / 50.0f) * 255.0f);
                  return lv_color_mix(lv_color_hex(0x4DD0E1), lv_color_hex(0x1E90FF), ratio);
                } else {
                  uint8_t ratio = (uint8_t)(((p - 50.0f) / 50.0f) * 255.0f);
                  return lv_color_mix(lv_color_hex(0xFFFFFF), lv_color_hex(0x4DD0E1), ratio);
                }

        - lambda: |-
            if (id(fan_mode) == 'm') {
              id(manual_speed) = (int)x;
            }
        - script.execute: sync_fan_ui
