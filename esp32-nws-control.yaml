    set_action:
      - lambda: |-
          float v = x;
          if (v < 20.0f) v = 20.0f;
          if (v > 30.0f) v = 30.0f;
          id(auto_temp_start) = v;
          if (id(auto_temp_max) < v) {
            id(auto_temp_max) = v;
            id(auto_temp_max_number).publish_state(v);
          }
          id(auto_temp_start_number).publish_state(v);

