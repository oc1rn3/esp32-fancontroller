            value: !lambda |-
              if (x < 20.0f) return 20;
              if (x > 45.0f) return 45;
              return (int)x;

        - lvgl.widget.update:
            id: ui_temperatur_bar_bottom
            indicator:
              bg_grad_color: !lambda |-
                float p = x;

                if (p <= 32.5f) {
                  uint8_t ratio = (uint8_t)(((p - 20.0f) / 12.5f) * 255.0f);
                  if (p < 20.0f) ratio = 0;
                  return lv_color_mix(lv_color_hex(0xFFFF00), lv_color_hex(0x0000FF), ratio);
                } else {
                  uint8_t ratio = (uint8_t)(((p - 32.5f) / 12.5f) * 255.0f);
                  if (p > 45.0f) ratio = 255;
                  return lv_color_mix(lv_color_hex(0xFF0000), lv_color_hex(0xFFFF00), ratio);
                }
        - lambda: |-
            if (!isnan(id(temp_nw_top).state)) {
              id(fan_delta_temp).publish_state(id(temp_nw_top).state - x);
            }
binary_sensor:
  - platform: homeassistant
    id: ha_wartung_state
    entity_id: input_boolean.flur_netzwerkschrank_wartung
    on_state:
      then:
        - lambda: |-
            if (id(ha_wartung_state).state) {
              lv_obj_clear_flag(id(ui_wartung_icon), LV_OBJ_FLAG_HIDDEN);
              lv_obj_set_style_text_color(id(ui_wartung_icon), lv_color_hex(0xFFA500), 0);
            } else {
              lv_obj_add_flag(id(ui_wartung_icon), LV_OBJ_FLAG_HIDDEN);
            }

  - platform: homeassistant
    id: ha_sleep_state
    entity_id: input_boolean.allgemein_schlafenszeit
    internal: true

  - platform: template
    id: sleep_mode_active
    name: "Schlafmodus aktiv"
    lambda: |-
      if (id(ha_api_connected)) {
        return id(ha_sleep_state).state;
      }
      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        return false;
      }
      const int start_minutes = id(local_sleep_start_hour) * 60 + id(local_sleep_start_minute);
      const int end_minutes = id(local_sleep_end_hour) * 60 + id(local_sleep_end_minute);
      const int current_minutes = now.hour * 60 + now.minute;
      if (start_minutes == end_minutes) {
        return false;
      }
      if (start_minutes < end_minutes) {
        return current_minutes >= start_minutes && current_minutes < end_minutes;
      }
