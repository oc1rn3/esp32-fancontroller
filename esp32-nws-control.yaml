substitutions:
  name: esp32-nws-control
  friendly_name: esp32-nws-control

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

  project:
    name: "EBH.NWS-Fan-Controller"
    version: "1.00"
  on_boot:
    priority: 600 # Wichtig: Hoch genug wählen, damit Hardware bereit ist
    then:
      - lambda: |-
          if (id(auto_temp_start) < 20.0f) id(auto_temp_start) = 20.0f;
          if (id(auto_temp_start) > 30.0f) id(auto_temp_start) = 30.0f;
          if (id(auto_temp_max) < 25.0f) id(auto_temp_max) = 25.0f;
          if (id(auto_temp_max) > 50.0f) id(auto_temp_max) = 50.0f;
          if (id(auto_temp_start) > id(auto_temp_max)) id(auto_temp_start) = id(auto_temp_max);
          if (id(auto_fan_min) < 20) id(auto_fan_min) = 20;
          if (id(auto_fan_min) > 80) id(auto_fan_min) = 80;
          if (id(auto_fan_max) < 30) id(auto_fan_max) = 30;
          if (id(auto_fan_max) > 100) id(auto_fan_max) = 100;
          if (id(auto_fan_min) > id(auto_fan_max)) id(auto_fan_min) = id(auto_fan_max);
          if (id(auto_temp_hysteresis) < 1.0f) id(auto_temp_hysteresis) = 1.0f;
          if (id(auto_temp_hysteresis) > 5.0f) id(auto_temp_hysteresis) = 5.0f;
          if (id(fan_mode_store) == 1) {
            id(fan_mode) = 'a';
          } else {
            id(fan_mode) = 'm';
          }
      - light.turn_on:
          id: disp_light
          brightness: 40%

      - script.execute: sync_fan_ui
      - script.execute: update_sleep_icon

      - lambda: |-
          if (id(ha_wartung_state).state) {
            lv_obj_clear_flag(id(ui_wartung_icon), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_text_color(id(ui_wartung_icon), lv_color_hex(0xFFA500), 0);
          } else {
            lv_obj_add_flag(id(ui_wartung_icon), LV_OBJ_FLAG_HIDDEN);
          }
      - script.execute: update_clock_display
      - script.execute: fan_auto_control

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

# Wichtiger Hinweis zu den Pins:
# Achte darauf, dass die Pins GPIO33 bis GPIO37 in deinem restlichen Code nicht verwendet werden, 
# da diese beim ESP32-S3R8 intern fest für die PSRAM-Anbindung reserviert sind.
psram:
    mode: octal
    speed: 80MHz

mdns:

safe_mode:

#http_request:

logger:
#  level: VERY_VERBOSE
#  logs:
#    touchscreen: VERY_VERBOSE # Zeigt jede Berührung im Log an
api:
  on_client_connected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - globals.set:
              id: ha_api_connected
              value: 'true'
          - lvgl.widget.show: ui_ha_connected
          - script.execute: sync_fan_ui
          - script.execute: update_clock_display
  on_client_disconnected:
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - globals.set:
              id: ha_api_connected
              value: 'false'
          - if:
              condition:
                lambda: "return id(fan_mode) == 'm';"
              then:
                - globals.set:
                    id: fan_mode
                    value: "'a'"
                - globals.set:
                    id: fan_mode_store
                    value: '1'
                - lvgl.widget.hide: ui_ha_connected
          - script.execute: sync_fan_ui
          - script.execute: update_clock_display

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
      - pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

script:
  - id: update_clock_display
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(ha_api_connected);"
          then:
            - lambda: |-
                // Home Assistant liefert die Werte direkt über die HA-Textsensoren.
          else:
            - if:
                condition:
                  lambda: "return id(wifi_connected) && id(sntp_time).now().is_valid();"
                then:
                  - lvgl.label.update:
                      id: ui_time
                      text: !lambda |-
                        auto now = id(sntp_time).now();
                        return str_sprintf("%02d:%02d", now.hour, now.minute);
                  - lvgl.label.update:
                      id: ui_date
                      text: !lambda |-
                        auto now = id(sntp_time).now();
                        return str_sprintf("%02d.%02d.%04d", now.day_of_month, now.month, now.year);
                else:
                  - lvgl.label.update:
                      id: ui_time
                      text: "--:--"
                  - lvgl.label.update:
                      id: ui_date
                      text: "--.--.----"

  - id: sync_fan_ui
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(fan_mode) == 'a';"
          then:
            - text_sensor.template.publish:
                id: fan_mode_text
                state: "AUTO"
            - lvgl.widget.disable: ui_fan_speed_slider
          else:
            - if:
                condition:
                  lambda: "return id(fan_mode) == 'm';"
                then:
                  - text_sensor.template.publish:
                      id: fan_mode_text
                      state: "MANUELL"
                  - lvgl.widget.enable: ui_fan_speed_slider
                else:
                  - text_sensor.template.publish:
                      id: fan_mode_text
                      state: "MANUELL"
                  - lvgl.widget.disable: ui_fan_speed_slider

      - if:
          condition:
            lambda: "return id(fan_mode) == 'a';"
          then:
            - lvgl.label.update:
                id: ui_fan_icon
                text: "\U000F171D"
                text_color: 0xFFA500
            - lvgl.slider.update:
                id: ui_fan_speed_slider
                value: !lambda "return (!id(nws_fan).state) ? 0 : (int) id(nws_fan).speed;"
          else:
            - if:
                condition:
                  lambda: "return (!id(nws_fan).state) || (id(nws_fan).speed <= 0);"
                then:
                  - lvgl.label.update:
                      id: ui_fan_icon
                      text: "\U000F081D"
                      text_color: 0xFF0000
                  - lvgl.slider.update:
                      id: ui_fan_speed_slider
                      value: 0
                else:
                  - lvgl.label.update:
                      id: ui_fan_icon
                      text: "\U000F0210"
                      text_color: 0xFFFFFF
                  - lvgl.slider.update:
                      id: ui_fan_speed_slider
                      value: !lambda "return (int) id(nws_fan).speed;"

      - lambda: |-
          lv_obj_t *ticks[] = {
            id(ui_fan_tick_0), id(ui_fan_tick_1), id(ui_fan_tick_2), id(ui_fan_tick_3), id(ui_fan_tick_4),
            id(ui_fan_tick_5), id(ui_fan_tick_6), id(ui_fan_tick_7), id(ui_fan_tick_8), id(ui_fan_tick_9),
            id(ui_fan_tick_10)
          };

          const int speed = (!id(nws_fan).state) ? 0 : (int) id(nws_fan).speed;
          const int start_x = 94;
          const int total_width = 206;
          const int base_y_major = 179;
          const int base_y_minor = 183;

          for (int i = 0; i <= 10; i++) {
            int x = start_x + ((i * total_width) / 10);
            const bool major = (i == 0 || i == 5 || i == 10);
            const bool active = speed >= (i * 10);

            int h = major ? (active ? 14 : 10) : (active ? 10 : 6);
            int w = major ? 3 : 2;
            int y = (major ? base_y_major : base_y_minor) - (h - (major ? 10 : 6));

            uint32_t color = 0x4A4A4A;
            if (i == 0) {
              color = 0xFFFFFF;
            } else if (i == 5) {
              color = 0xFFA500;
            } else if (i == 10) {
              color = 0xFF0000;
            } else if (active) {
              color = 0xA8D8FF;
            }

            lv_obj_set_x(ticks[i], x - (w / 2));
            lv_obj_set_size(ticks[i], w, h);
            lv_obj_set_y(ticks[i], y);
            lv_obj_set_style_bg_color(ticks[i], lv_color_hex(color), LV_PART_MAIN);
            lv_obj_set_style_bg_opa(ticks[i], LV_OPA_COVER, LV_PART_MAIN);
          }

  - id: update_sleep_icon
    mode: restart
    then:
      - lambda: |-
          if (id(sleep_mode_active).state) {
            lv_obj_clear_flag(id(ui_sleepmode), LV_OBJ_FLAG_HIDDEN);
            lv_obj_set_style_text_color(id(ui_sleepmode), lv_color_hex(0x7AA2FF), 0);
          } else {
            lv_obj_add_flag(id(ui_sleepmode), LV_OBJ_FLAG_HIDDEN);
          }

  - id: fan_auto_control
    mode: restart
    then:
      - lambda: |-
          if (id(fan_mode) != 'a') {
            return;
          }

          float top = id(temp_nw_top).state;
          float bottom = id(temp_nw_bottom).state;

          if (!isnan(top)) {
            id(last_valid_top_temp) = top;
          }
          if (!isnan(bottom)) {
            id(last_valid_bottom_temp) = bottom;
          }

          float control_temp = top;
          std::string reason = "AUTO";

          if (isnan(control_temp) && !isnan(bottom)) {
            control_temp = bottom;
            reason = "FALLBACK UNTEN";
          } else if (isnan(control_temp) && !isnan(id(last_valid_top_temp))) {
            control_temp = id(last_valid_top_temp);
            reason = "FALLBACK LETZT";
          } else if (isnan(control_temp) && !isnan(id(last_valid_bottom_temp))) {
            control_temp = id(last_valid_bottom_temp);
            reason = "FALLBACK UNTEN LETZT";
          }

          if (!isnan(top) && !isnan(bottom)) {
            id(fan_delta_temp).publish_state(top - bottom);
          } else if (!isnan(id(last_valid_top_temp)) && !isnan(id(last_valid_bottom_temp))) {
            id(fan_delta_temp).publish_state(id(last_valid_top_temp) - id(last_valid_bottom_temp));
          }

          int desired = 0;

          if (isnan(control_temp)) {
            desired = id(failsafe_fan_speed);
            reason = "FAILSAFE SENSOR";
          } else {
            const float start = id(auto_temp_start);
            const float max_t = id(auto_temp_max);
            const float critical = id(auto_temp_critical);
            const float hyst = id(auto_temp_hysteresis);

            const int fan_min = id(auto_fan_min);
            int fan_max = id(auto_fan_max);

            const bool sleep_active = id(sleep_mode_active).state;
            if (sleep_active) {
              fan_max = std::min(fan_max, id(night_fan_max));
            }

            if (control_temp >= critical) {
              desired = 100;
              reason = sleep_active ? "KRITISCH NACHT" : "KRITISCH";
            } else if (control_temp <= (start - hyst)) {
              desired = 0;
              reason = sleep_active ? "NACHT AUS" : "AUTO AUS";
            } else if (control_temp < start) {
              desired = id(last_auto_speed);
              if (reason == "AUTO")
                reason = sleep_active ? "NACHT HALTEN" : "AUTO HALTEN";
            } else if (control_temp >= max_t) {
              desired = fan_max;
              if (reason == "AUTO")
                reason = sleep_active ? "NACHT MAX" : "AUTO MAX";
            } else {
              float ratio = (control_temp - start) / std::max(0.1f, (max_t - start));
              desired = fan_min + (int) roundf(ratio * (fan_max - fan_min));
              if (reason == "AUTO")
                reason = sleep_active ? "AUTO NACHT" : "AUTO TAG";
            }
          }

          desired = std::max(0, std::min(100, desired));
          id(last_auto_speed) = desired;
          id(fan_target_speed).publish_state(desired);
          id(fan_control_reason).publish_state(reason);

          const int current = (!id(nws_fan).state) ? 0 : (int) id(nws_fan).speed;
          if (abs(desired - current) < 2) {
            return;
          }

          if (desired <= 0) {
            auto call = id(nws_fan).turn_off();
            call.perform();
          } else {
            auto call = id(nws_fan).turn_on();
            call.set_speed(desired);
            call.perform();
          }

ota:
  - platform: esphome
  - platform: web_server

web_server:
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  local: True

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
#  use_address: xxx.xxx.xxx.xxx
  # Trigger für den WLAN-Status
  on_connect:
    then:
      - globals.set:
          id: wifi_connected
          value: 'true'
      - lvgl.widget.show: ui_wifi_connected  # Zeigt das Widget, wenn WLAN steht
      - script.execute: update_clock_display
  on_disconnect:
    then:
      - globals.set:
          id: wifi_connected
          value: 'false'
      - globals.set:
          id: ha_api_connected
          value: 'false'
      - if:
          condition:
            lambda: "return id(fan_mode) == 'm';"
          then:
            - globals.set:
                id: fan_mode
                value: "'a'"
            - lvgl.widget.hide: ui_wifi_connected  # Versteckt es, wenn die Verbindung weg
      - lvgl.widget.hide: ui_ha_connected
      - script.execute: sync_fan_ui
      - script.execute: update_clock_display

  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret apwifi_password
    ap_timeout: 0s

captive_portal:

interval:
  - interval: 30s
    then:
      - script.execute: update_clock_display
      - script.execute: fan_auto_control

globals:
  - id: fan_mode
    type: char
    restore_value: false
    initial_value: "'a'"   # laufender Modus; Restore erfolgt über fan_mode_store

  - id: fan_mode_store
    type: int
    restore_value: true
    initial_value: '1'      # 1=auto, 0=manual

  - id: fan_step
    type: int
    initial_value: "5"      # Schrittweite in Prozentpunkten

  - id: manual_speed
    type: int
    initial_value: '100'  # Startwert

  - id: auto_temp_start
    type: float
    restore_value: true
    initial_value: '20.0'

  - id: auto_temp_max
    type: float
    restore_value: true
    initial_value: '50.0'

  - id: auto_fan_min
    type: int
    restore_value: true
    initial_value: '10'

  - id: auto_fan_max
    type: int
    restore_value: true
    initial_value: '60'

  - id: auto_temp_critical
    type: float
    restore_value: true
    initial_value: '50.0'

  - id: auto_temp_hysteresis
    type: float
    restore_value: true
    initial_value: '1.0'

  - id: last_auto_speed
    type: int
    restore_value: false
    initial_value: '0'

  - id: last_valid_top_temp
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: last_valid_bottom_temp
    type: float
    restore_value: false
    initial_value: 'NAN'

  - id: failsafe_fan_speed
    type: int
    restore_value: true
    initial_value: '50'

  - id: previous_fan_mode
    type: char
    restore_value: true
    initial_value: "'a'"

  - id: ha_api_connected
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: wifi_connected
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: local_sleep_start_hour
    type: int
    restore_value: true
    initial_value: '22'

  - id: local_sleep_start_minute
    type: int
    restore_value: true
    initial_value: '0'

  - id: local_sleep_end_hour
    type: int
    restore_value: true
    initial_value: '8'

  - id: local_sleep_end_minute
    type: int
    restore_value: true
    initial_value: '0'

  - id: night_fan_max
    type: int
    restore_value: true
    initial_value: '30'

###############################
# SPI fürs TFT (Waveshare-Pins)
###############################

spi:
  - id: spi_tft
    clk_pin: GPIO39           # dein Display-SCLK
    mosi_pin: GPIO38          # dein Display-MOSI
  # MISO ist für dieses Panel nicht erforderlich
    interface: hardware
    
###############################
# DISPLAY (ST7789V, Custom)
###############################
display:
  - platform: ili9xxx
    spi_id: spi_tft
    id: my_display
    model: ST7789V   # << Hier KEIN "Custom", sondern direkt das Modell
    dc_pin: GPIO42
    cs_pin: GPIO45
    reset_pin: GPIO0
    rotation: 90
    dimensions:
      width: 240
      height: 320
    # Wir lassen Offsets erst mal weg, um Ghosting zu vermeiden
    invert_colors: true
    update_interval: never

###############################
# TOUCH – CST816D (I2C + INT)
###############################
i2c:
  sda: GPIO48              # TP SDA
  scl: GPIO47              # TP SCL
  frequency: 400kHz
  scan: true

touchscreen:
  - platform: cst816
    id: my_touchscreen
    display: my_display
    interrupt_pin: GPIO46
    # Falls der Klick an der falschen Stelle landet, 
    # hilft oft das Spiegeln einer Achse:
    transform:
      swap_xy: True
      mirror_y: True
      mirror_x: False

    calibration:
      x_min: 16     # aus deinem Log (links)
      x_max: 313   # aus deinem Log (rechts)
      y_min: 1     # aus deinem Log (oben)
      y_max: 227   # aus deinem Log (unten)

###############################
#   LVGL: Seiten & Widgets
###############################
lvgl:
  touchscreens:
    - touchscreen_id: my_touchscreen
  displays: my_display
  buffer_size: 50%
  pages:
