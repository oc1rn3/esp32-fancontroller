output:
  - platform: ledc
    pin: GPIO1
    frequency: 25000 Hz    
    id: lcd_backlight_pwm

  - platform: ledc
    pin: GPIO18
    frequency: 25000 Hz
    id: fan_pwm

light:
  - platform: monochromatic
    output: lcd_backlight_pwm
    name: "Display Helligkeit"
    id: disp_light
    restore_mode: ALWAYS_ON

text_sensor:
  - platform: homeassistant
    id: ha_time_string
    entity_id: sensor.time
    # Jedes Mal, wenn sich der String in HA ändert (jede Minute):
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(ha_api_connected);"
            then:
              - lvgl.label.update:
                  id: ui_time
                  text: !lambda 'return x.c_str();'
  - platform: homeassistant
    id: ha_date_string
    entity_id: sensor.date_ger_short_format
    # Jedes Mal, wenn sich der String in HA ändert (jeden Tag):
    on_value:
      then:
        - if:
            condition:
              lambda: "return id(ha_api_connected);"
            then:
              - lvgl.label.update:
                  id: ui_date
                  text: !lambda 'return x.c_str();'

  - platform: template
    id: fan_mode_text
    name: "Lüfter Modus"
    icon: "mdi:fan-auto"
    update_interval: never

  - platform: template
    id: fan_control_reason
    name: "Lüfter Regelgrund"
    icon: "mdi:information-outline"
    update_interval: never

button:
  - platform: restart
    name: "${friendly_name} neu starten"
    id: reboot_device
    entity_category: config
  - platform: safe_mode
    name: "${friendly_name} Safe Mode Boot"
  - platform: factory_reset
    name: "${friendly_name} Factory Reset"

select:
  - platform: template
    id: fan_mode_select
    name: "Lüfter Modus"
    icon: "mdi:fan-auto"
    options:
      - AUTO
      - MANUELL
    lambda: |-
      return (id(fan_mode) == 'a') ? std::string("AUTO") : std::string("MANUELL");
    set_action:
      - if:
          condition:
            lambda: 'return x == "AUTO";'
          then:
            - globals.set:
                id: fan_mode
                value: "'a'"
            - globals.set:
                id: fan_mode_store
                value: '1'
            - globals.set:
                id: previous_fan_mode
                value: "'a'"
            - script.execute: sync_fan_ui
            - script.execute: fan_auto_control
          else:
            - globals.set:
                id: fan_mode
                value: "'m'"
            - globals.set:
                id: fan_mode_store
                value: '0'
            - globals.set:
                id: previous_fan_mode
                value: "'m'"
            - lambda: |-
                id(manual_speed) = (!id(nws_fan).state) ? std::max(id(fan_step), id(manual_speed)) : (int) id(nws_fan).speed;
            - script.execute: sync_fan_ui

