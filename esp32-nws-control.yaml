        - label:
            id: ui_status_temperatur_bottom_icon
            x: 194
            y: 83
            width: 18
            height: 34
            text: "\U000F0E02"
            text_font: font_mdi_middle
            text_color: 0xFFFFFF
            text_align: LEFT

        - label:
            id: ui_status_temperatur_bottom
            x: 214
            y: 83
            width: 83
            height: 34
            text: "--.- °C"
            text_font: font_middle
            text_color: 0xFFFFFF
            text_align: RIGHT

        - button:
            id: ui_fan_mode_button
            x: 12
            y: 146
            width: 64
            height: 64
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            press_lock: true
            widgets:
              - label:
                  id: ui_fan_icon
                  align: CENTER
                  text: "\U000F171D"
                  text_font: font_mdi_big
                  text_color: 0xFFFFFF
                  text_align: CENTER
            on_short_click:
              then:
                - if:
                    condition:
                      lambda: "return id(fan_mode) == 'a';"
                    then:
                      - globals.set:
                          id: fan_mode
                          value: "'m'"
                      - globals.set:
                          id: fan_mode_store
                          value: '0'
                      - globals.set:
                          id: previous_fan_mode
                          value: "'m'"
                      - lambda: |-
                          id(manual_speed) = (!id(nws_fan).state) ? std::max(id(fan_step), id(manual_speed)) : (int) id(nws_fan).speed;
                    else:
                      - globals.set:
                          id: fan_mode
                          value: "'a'"
                      - globals.set:
                          id: fan_mode_store
                          value: '1'
                      - globals.set:
                          id: previous_fan_mode
                          value: "'a'"
                - script.execute: sync_fan_ui
            on_long_press:
              then:
                - globals.set:
                    id: fan_mode
                    value: "'m'"
                - globals.set:
                    id: fan_mode_store
                    value: '0'
                - globals.set:
                    id: previous_fan_mode
                    value: "'m'"
                - lambda: |-
                    id(manual_speed) = 0;
                - fan.turn_off: nws_fan
                - script.execute: sync_fan_ui

        - obj:
            id: ui_fan_slider_glow
