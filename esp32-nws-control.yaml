    id: fan_delta_temp
    name: "Temperatur Delta"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    update_interval: never

  - platform: dallas_temp
    id: temp_nw_top
    address: 0x
    name: "Temperatur oben"
    update_interval: 60s
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    on_value:
      then:
        - lvgl.label.update:
            id: ui_status_temperatur_top
            text: !lambda |-
              return str_sprintf("%.1f °C", x);
        - lvgl.bar.update:
            id: ui_temperatur_bar_top
            value: !lambda |-
              if (x < 20.0f) return 20;
              if (x > 45.0f) return 45;
              return (int)x;

        - lvgl.widget.update:
            id: ui_temperatur_bar_top
            indicator:
              bg_grad_color: !lambda |-
                float p = x;

                if (p <= 32.5f) {
                  uint8_t ratio = (uint8_t)(((p - 20.0f) / 12.5f) * 255.0f);
                  if (p < 20.0f) ratio = 0;
                  return lv_color_mix(lv_color_hex(0xFFFF00), lv_color_hex(0x0000FF), ratio);
                } else {
                  uint8_t ratio = (uint8_t)(((p - 32.5f) / 12.5f) * 255.0f);
                  if (p > 45.0f) ratio = 255;
                  return lv_color_mix(lv_color_hex(0xFF0000), lv_color_hex(0xFFFF00), ratio);
                }
        - lambda: |-
            if (!isnan(id(temp_nw_bottom).state)) {
              id(fan_delta_temp).publish_state(x - id(temp_nw_bottom).state);
            }

  - platform: dallas_temp
    id: temp_nw_bottom
    address: 0x
    name: "Temperatur unten"
    update_interval: 60s
    accuracy_decimals: 1
    unit_of_measurement: "°C"
    on_value:
      then:
        - lvgl.label.update:
            id: ui_status_temperatur_bottom
            text: !lambda |-
              return str_sprintf("%.1f °C", x);
        - lvgl.bar.update:
